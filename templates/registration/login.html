<!-- templates/registration/login.html -->
<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Iniciar Sesion</title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
    <style>
        body { background-color: #f0f4f8; }
    </style>
</head>
<body>
<div class='container'>
    <div class='row justify-content-center mt-5'>
        <div class='col-md-5 col-sm-8'>

            <div class='text-center mb-4'>
                <h2 style='color:#1F4E79; font-weight:700;'>&#128218; Sistema de Calificaciones</h2>
            </div>

            <div class='card shadow-sm'>
                <div class='card-header text-center py-3' style='background:#1F4E79; color:white;'>
                    <h4 class='mb-0'>Iniciar Sesion</h4>
                </div>
                <div class='card-body p-4'>

                    {% if messages %}
                        {% for message in messages %}
                            <div class='alert alert-danger alert-dismissible fade show' role='alert'>
                                {{ message }}
                                <button type='button' class='btn-close' data-bs-dismiss='alert'></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method='POST'>
                        {% csrf_token %}
                        <div class='mb-3'>
                            <label class='form-label fw-semibold'>Usuario</label>
                            <input type='text' name='username' class='form-control' placeholder='Tu nombre de usuario' required autofocus>
                        </div>
                        <div class='mb-4'>
                            <label class='form-label fw-semibold'>Contrasena</label>
                            <input type='password' name='password' class='form-control' placeholder='Tu contrasena' required>
                        </div>
                        <button type='submit' class='btn w-100 text-white fw-bold' style='background:#1F4E79;'>Entrar</button>
                    </form>

                </div>
                <div class='card-footer text-center py-3 bg-white'>
                    <small class='text-muted'>No tienes cuenta?
                        <a href='{% url "registro" %}' class='fw-semibold'>Registrate aqui</a>
                    </small>
                </div>
            </div>

        </div>
    </div>
</div>
<script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js'></script>
</body>
</html>
